name: mro-recommender
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip

  # ── Core data ──────────────────────────────────────────────
  - pandas=2.2
  - numpy=1.26
  - pyarrow          # parquet read/write for model catalog

  # ── Notebook ───────────────────────────────────────────────
  - jupyterlab
  - ipykernel
  - ipywidgets       # progress bars in notebooks

  # ── Viz / EDA ──────────────────────────────────────────────
  - matplotlib
  - seaborn

  # ── Utilities ─────────────────────────────────────────────
  - tqdm             # progress bars in loops
  - python-dotenv

  # ── Web scraping ──────────────────────────────────────────
  - pip:
    - httpx>=0.27.0          # async HTTP client
    - beautifulsoup4>=4.12   # HTML parsing
    - lxml                   # fast HTML parser backend for bs4

  # ── Recommender model ─────────────────────────────────────
  - pip:
    - scikit-learn>=1.3.0    # TF-IDF vectorizer + cosine similarity
    - joblib>=1.3.0          # model serialization
    - sentence-transformers  # future: embedding-based retrieval
    - faiss-cpu              # future: fast nearest-neighbor search
